<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Wince UMD Sandbox</title>
    <style>
      body { font-family: Inter, system-ui, Arial, sans-serif; padding: 24px; line-height: 1.4 }
      pre { background: #f6f8fa; padding: 12px; border-radius: 6px }
    </style>
  </head>
  <body>
    <h1>Wince UMD Sandbox</h1>
    <p>This page loads the single UMD bundle from <strong>@wince/web</strong> and shows the exported API.</p>

    <div id="result"><em>loading...</em></div>

    <!-- Load the bundled UMD copied into sandbox/vendor by the build/watch -->
    <script src="./vendor/index.umd.js"></script>

    <script>
      const out = document.getElementById('result');
      try {
        const W = window.Wince ?? {};
        const coreVal = typeof W.core === 'function' ? W.core() : 'n/a';
        out.innerHTML = `<pre>core(): ${coreVal}</pre>`;
        console.log('Wince global:', W);
      } catch (err) {
        out.textContent = 'Error: ' + err.message;
        console.error(err);
      }
    </script>
  </body>
</html>
